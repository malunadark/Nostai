<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOSTAI</title>

<style>
@font-face {
  font-family: 'Destroy';
  src: url('../assets/fonts/destroycyr.ttf') format('truetype');
  font-display: swap;
}

/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  width:100%;
  height:100%;
  overflow:hidden;
}

/* ===== ФОН ===== */
body{
  display:flex;
  align-items:center;
  justify-content:center;

  background:
    radial-gradient(circle at center, rgba(255,120,40,0.2), rgba(0,0,0,0.95) 70%),
    url(../assets/images/Nostai.png') center/cover no-repeat;

  background-blend-mode: overlay;
}

/* ===== ЛОГО ===== */
.logo{
  font-family: 'Destroy', serif;
  font-size: clamp(90px, 10vw, 220px);
  letter-spacing: 10px;
  color: #ffb36b;

  text-align:center;
  cursor:pointer;

  text-shadow:
    0 0 10px #ff8c00,
    0 0 25px #ff5a00,
    0 0 50px rgba(255,80,0,0.8),
    0 0 100px rgba(255,40,0,0.6);

  transition: all 0.4s ease;
}

.logo:hover{
  transform: scale(1.08);
  text-shadow:
    0 0 20px #ffae42,
    0 0 40px #ff6a00,
    0 0 80px rgba(255,80,0,1),
    0 0 140px rgba(255,30,0,0.8);
}

/* ===== ПЕПЕЛ ===== */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="logo" onclick="goChronicles()">
  NOSTAI
</div>

<canvas id="ash"></canvas>

<script>
function goChronicles(){
  window.location.href = "./html/chronicles.html";
}

/* ===== ПЕПЕЛ ===== */
const canvas = document.getElementById("ash");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const particles = [];
const COUNT = Math.min(180, Math.floor(window.innerWidth / 10));

for(let i=0;i<COUNT;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*3+1,
    speed:Math.random()*0.7+0.2,
    opacity:Math.random()*0.5+0.2
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.fillStyle=`rgba(200,200,200,${p.opacity})`;
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();

    p.y += p.speed;
    p.x += Math.sin(p.y * 0.01) * 0.3;

    if(p.y > canvas.height){
      p.y = -10;
      p.x = Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
